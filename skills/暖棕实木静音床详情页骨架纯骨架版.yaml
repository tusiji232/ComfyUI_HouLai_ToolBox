  s1|kind=hero-opening|bg=warm-beige-bedroom|camera=front-centered-full-bed|layout=top-large-copy_bottom-full-bed|subject=single-dominant-bed-in-room|accent=bedside-lamps_and_soft-rug|text_mode=strong|text_zone=top-center|text_align=center|text_density=two-line|copy_role=hero-benefit|slot={{copy_function_language_1}}|negative=headline-only
  s2|kind=detail-grid|bg=light-warm-gray-panel|camera=2x2-feature-collage|layout=top-title_bottom-rounded-four-panel-grid|subject=multi-panel-bed-features|accent=caption-cards_and_soft-borders|text_mode=strong|text_zone=top-center_and_panel-bottom|text_align=center|text_density=caption-grid|copy_role=feature-callout|slot={{copy_function_language_2}}|negative=single-image-only
  s3|kind=scene-collage|bg=warm-home-bedroom|camera=three-quarter-room-view-bed-scene|layout=top-title-and-badge_bottom-large-scene|subject=single-bed-in-styled-bedroom|accent=emphasis-pill_and_wall-art|text_mode=strong|text_zone=top-center|text_align=center|text_density=short-paragraph|copy_role=scene-note|slot={{copy_function_language_3}}|negative=single-centered-packshot
  s4|kind=macro-closeup|bg=light-cream-panel|camera=closeup-headboard-corner|layout=top-title_bottom-large-closeup|subject=wave-headboard-and-wood-grain|accent=curved-silhouette|text_mode=strong|text_zone=top-center|text_align=center|text_density=short-paragraph|copy_role=material-note|slot={{copy_function_language_4}}|negative=single-image-only
  s5|kind=evidence-panel|bg=deep-brown-top-band_plus_warm-room|camera=people-standing-on-bed-test|layout=top-dark-banner_middle-proof-scene_with_large-overlay-copy|subject=multi-person-load-test|accent=bold-radial-lines_and_large-proof-copy|text_mode=strong|text_zone=top-banner_and_center-overlay|text_align=center|text_density=data-callout|copy_role=comfort-proof|slot={{copy_function_language_5}}|negative=headline-only
