name: "暖棕实木静音床详情页骨架纯骨架版"
description: "实木床、双人床、静音床、现代简约主卧床风格的纯骨架版详情页 skill：保留卧室开场主图、2x2 核心卖点、整床场景、波浪床头特写、多人承重证明、龙骨支撑拆解、结构对比和静音收尾 8 屏骨架，不承载运行时文案与业务判断。适合实木床、主卧床、民宿床、暖棕家居详情页复刻。"
category: "详情页模板"
schema_version: "style_only_v3"
trigger: "实木静音床"
trigger_words:
  - "实木静音床"
  - "双人床"
  - "主卧床"
  - "现代简约床"
  - "民宿床"
weight: 1.0
tags:
  - name: "实木静音床"
    weight: 1.0
  - name: "双人床"
    weight: 1.0
  - name: "主卧床"
    weight: 0.99
  - name: "现代简约床"
    weight: 0.98
  - name: "民宿床"
    weight: 0.97
  - name: "暖棕实木"
    weight: 0.96
  - name: "波浪床头"
    weight: 0.95
  - name: "静音稳固"
    weight: 0.94

shots:
  - id: "screen_1"
    name: "开场主图"
    description: "source_refs:[1]; 功能: 暖棕卧室空间中的整床开场，上部大标题与副标题，下部正面整床稳定承接。"
    order: 1
    prompt_guide: "f_code=F1+F6; screen_kind=hero-opening; style_tokens=[warm_bedroom, centered_bed, large_headline]"
  - id: "screen_2"
    name: "核心卖点"
    description: "source_refs:[2]; 功能: 顶部标题，下部 2x2 卖点宫格，分别展示床头、整床、铺板与连接结构。"
    order: 2
    prompt_guide: "f_code=F3; screen_kind=detail-grid; style_tokens=[2x2_feature_grid, rounded_panels, caption_cards]"
  - id: "screen_3"
    name: "卧室场景"
    description: "source_refs:[3]; 功能: 上部大标题与强调标签，下部大幅卧室场景整床图，强化浪漫与居家氛围。"
    order: 3
    prompt_guide: "f_code=F2+F6; screen_kind=scene-hero; style_tokens=[full_room_scene, warm_home_staging, emphasis_badge]"
  - id: "screen_4"
    name: "床头特写"
    description: "source_refs:[4]; 功能: 标题说明加床头近景特写，突出波浪造型与层次线条。"
    order: 4
    prompt_guide: "f_code=F5; screen_kind=macro-closeup; style_tokens=[headboard_closeup, wave_profile, warm_wood_texture]"
  - id: "screen_5"
    name: "承重证明"
    description: "source_refs:[5]; 功能: 顶部稳固标题，中部多人站立测试图，保留强视觉证明与大字压感。"
    order: 5
    prompt_guide: "f_code=F3+F6; screen_kind=proof-scene; style_tokens=[multi_person_test, bold_overlay_copy, stability_proof]"
  - id: "screen_6"
    name: "结构拆解"
    description: "source_refs:[6]; 功能: 大标题加整床骨架拆解图，展示龙骨与多脚支撑结构。"
    order: 6
    prompt_guide: "f_code=F3; screen_kind=evidence-panel; style_tokens=[frame_structure_view, center_support_legs, clean_exploded_layout]"
  - id: "screen_7"
    name: "结构对比"
    description: "source_refs:[7]; 功能: 左右对比说明与下半区受力对照图，突出多点支撑优于四角支撑。"
    order: 7
    prompt_guide: "f_code=F3; screen_kind=compare-proof; style_tokens=[left_right_comparison, support_diagram, load_icons]"
  - id: "screen_8"
    name: "静音收尾"
    description: "source_refs:[8]; 功能: 顶部深色标题条与静音文案，下部整床场景收尾，延续暖色卧室氛围。"
    order: 8
    prompt_guide: "f_code=F2+F6; screen_kind=comfort-closure; style_tokens=[top_banner, slat_focus_bed_scene, quiet_sleep_finish]"

