  s7|kind=compare-proof|bg=light-gray-comparison-panel|camera=diagram-comparison|layout=upper-two-column-compare_lower-load-bearing-compare|subject=support-structure-diagrams|accent=check-cross-icons_and_weight-blocks|text_mode=strong|text_zone=top-band_and_mid-cards|text_align=center|text_density=data-callout|copy_role=proof-data|slot={{copy_function_language_7}}|negative=no-compare-layout
  s8|kind=brand-closure|bg=warm-bedroom-with-dark-top-banner|camera=full-bed-scene-with-visible-slats|layout=top-dark-banner_middle-title-copy_bottom-bed-scene|subject=single-bed-quiet-sleep-closure|accent=top-brown-band_and_room-props|text_mode=strong|text_zone=top-band_and_upper-left|text_align=left|text_density=short-paragraph|copy_role=choice-recap|slot={{copy_function_language_8}}|negative=headline-only

