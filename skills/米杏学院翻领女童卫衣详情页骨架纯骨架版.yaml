name: 米杏学院翻领女童卫衣详情页骨架纯骨架版
description: 女童卫衣、翻领卫衣、学院风上衣、春秋童装风格的纯骨架版详情页 skill：保留图标开场、模特信息卡、搭配色卡、面料证明、细节竖排、尺码表、lookbook 单模特和白底站姿收尾 8 屏骨架，不承载运行时文案与业务判断。适合女童翻领卫衣、学院风打底衫、宽松童装上衣详情页复刻。
category: 详情页模板
schema_version: style_only_v3
trigger: 翻领卫衣
trigger_words:
- 翻领卫衣
- 女童卫衣
- 学院上衣
- 宽松卫衣
- 童装上装
weight: 1.0
tags:
- name: 翻领卫衣
  weight: 1.0
- name: 女童卫衣
  weight: 1.0
- name: 学院上衣
  weight: 0.99
- name: 宽松卫衣
  weight: 0.98
- name: 童装上装
  weight: 0.97
- name: lookbook
  weight: 0.96
- name: 尺码表
  weight: 0.95
- name: 面料细节
  weight: 0.94
shots:
- id: screen_1
  name: 学院开场
  description: 'source_refs:[1]; 功能: 米杏背景中的单模特开场，保留左侧图标列、竖向卖点和大面积服装主体。'
  order: 1
  prompt_guide: f_code=F1+F6; screen_kind=hero-opening; style_tokens=[cream_school_board, icon_column, single_child_model]
- id: screen_2
  name: 模特信息
  description: 'source_refs:[2]; 功能: 头像加基础参数的小型模特信息卡，延续高留白和横向信息条结构。'
  order: 2
  prompt_guide: f_code=F4; screen_kind=spec-panel; style_tokens=[mini_child_model_profile, centered_data_strip, clean_margin]
- id: screen_3
  name: 搭配色卡
  description: 'source_refs:[3]; 功能: 左侧单品缩略列加右侧全身模特的搭配色卡页。'
  order: 3
  prompt_guide: f_code=F5+F6; screen_kind=compare-closure; style_tokens=[outfit_column, full_body_child_model, cream_edit_board]
- id: screen_4
  name: 面料证明
  description: 'source_refs:[4]; 功能: 双面料微距配底部短说明的材质证明页。'
  order: 4
  prompt_guide: f_code=F2; screen_kind=macro-closeup; style_tokens=[twin_fabric_macro, bottom_note, soft_texture]
- id: screen_5
  name: 细节竖排
  description: 'source_refs:[5]; 功能: 三张纵向细节裁片展示领口、贴片和绒感结构。'
  order: 5
  prompt_guide: f_code=F3; screen_kind=detail-grid; style_tokens=[vertical_detail_stack, garment_parts, cream_frame]
- id: screen_6
  name: 尺码参考
  description: 'source_refs:[6]; 功能: 上装尺码表加试穿区间的白底信息页。'
  order: 6
  prompt_guide: f_code=F4; screen_kind=spec-panel; style_tokens=[size_table, try_on_band, white_data_card]
- id: screen_7
  name: 单模特图鉴
  description: 'source_refs:[7]; 功能: 单模特 lookbook 页面，保留黑色标题条和米色框景。'
  order: 7
  prompt_guide: f_code=F6; screen_kind=product-hero; style_tokens=[single_child_model_lookbook, cream_photo_frame, weak_copy]
- id: screen_8
  name: 白底收尾
  description: 'source_refs:[8]; 功能: 白底全身站姿收尾页，保留极简边框和完整下装展示。'
  order: 8
  prompt_guide: f_code=F1; screen_kind=model-closure; style_tokens=[full_body_closure, clean_border, white_studio]
template: 'sv=style_only_v3

  cn=中文骨架说明

  pd={{product}}

  pi={{product_info}}

  sp={{selling_points}}

  pf={{platform}}

  lg={{language}}

  bc={{batch_count}}

  arch=skeleton-only

  brain=system-prompt-only

  s1|kind=hero-opening|bg=warm-cream-school-board|camera=single-child-model-front-standing|layout=left-icon-column_right-large-model|subject=one-child-model-in-statement-collar-sweatshirt|accent=mini-badge-column|text_mode=strong|text_zone=top-left|text_align=left|text_density=two-line|copy_role=hero-benefit|slot={{copy_function_language_1}}|negative=plain-white-packshot

  s2|kind=spec-panel|bg=clean-cream-info-strip|camera=mini-child-model-avatar-plus-data-row|layout=left-avatar_right-parameter-text|subject=child-model-profile-card|accent=thin-divider-line|text_mode=weak|text_zone=top-left|text_align=left|text_density=label-only|copy_role=proof-data|slot={{copy_function_language_2}}|negative=headline-only

  s3|kind=compare-closure|bg=cream-fashion-board|camera=outfit-thumbnails-plus-full-body-child-model|layout=left-product-column_right-model_bottom-soft-shadow|subject=single-top-with-matching-bottom-reference|accent=mini-color-tabs|text_mode=strong|text_zone=top-left|text_align=left|text_density=bullet-list|copy_role=feature-callout|slot={{copy_function_language_3}}|negative=no-compare-layout

  s4|kind=macro-closeup|bg=warm-white-fabric-board|camera=two-large-fabric-macro-cards|layout=top-title_middle-dual-macro_bottom-note-box|subject=soft-fabric-texture-proof|accent=thin-outline-card|text_mode=strong|text_zone=top-left|text_align=left|text_density=short-paragraph|copy_role=material-note|slot={{copy_function_language_4}}|negative=single-centered-packshot

  s5|kind=detail-grid|bg=cream-vertical-detail-board|camera=three-stacked-garment-crops|layout=top-copy_bottom-vertical-detail-stack|subject=collar_patch_and_fleece_details|accent=rounded-cream-panels|text_mode=weak|text_zone=top-left|text_align=left|text_density=caption-grid|copy_role=feature-callout|slot={{copy_function_language_5}}|negative=single-image-only

  s6|kind=spec-panel|bg=white-size-card|camera=size-table-with-fit-band|layout=top-title_middle-data-table_bottom-size-band|subject=topwear-size-chart|accent=age-range-badges|text_mode=strong|text_zone=top-left|text_align=left|text_density=data-table|copy_role=proof-data|slot={{copy_function_language_6}}|negative=headline-only

  s7|kind=product-hero|bg=light-cream-lookbook-frame|camera=single-child-model-mid-shot|layout=top-title_bottom-single-model-frame|subject=one-child-model-in-soft-top|accent=dark-title-strip|text_mode=weak|text_zone=top-left|text_align=left|text_density=one-line|copy_role=scene-note|slot={{copy_function_language_7}}|negative=single-centered-packshot

  s8|kind=product-hero|bg=clean-white-studio|camera=full-body-child-model-standing|layout=top-weak-copy_bottom-full-body-model|subject=one-child-model-full-look|accent=soft-cream-border|text_mode=weak|text_zone=top-center|text_align=center|text_density=one-line|copy_role=choice-recap|slot={{copy_function_language_8}}|negative=headline-only'
defaults:
  schema_version: style_only_v3
  screen_count: '8'
  style_transfer_mode: style_only
  dynamic_sequence: 'true'
  language_lock: strict
  output_language: 中文
variables:
  product: ''
  product_info: ''
  selling_points: ''
  language: 中文
  platform: ''
  batch_count: '8'
  copy_function_language_1: ''
  copy_function_language_2: ''
  copy_function_language_3: ''
  copy_function_language_4: ''
  copy_function_language_5: ''
  copy_function_language_6: ''
  copy_function_language_7: ''
  copy_function_language_8: ''
