name: 奶咖轻塑无痕内衣详情页骨架纯骨架版
description: 无痕内衣、轻塑文胸、奶咖 bra、小胸支撑内衣风格的纯骨架版详情页 skill：保留模特开场、结构示意、静物单品、分栏模特、拱门模特、杯型细节、颜色延展和拉伸收尾 8 屏骨架，不承载运行时文案与业务判断。适合轻塑内衣、日常文胸、奶咖色无痕内衣详情页复刻。
category: 详情页模板
schema_version: style_only_v3
trigger: 轻塑内衣
trigger_words:
- 轻塑内衣
- 无痕文胸
- 奶咖内衣
- 小胸支撑
- 美背文胸
weight: 1.0
tags:
- name: 轻塑内衣
  weight: 1.0
- name: 无痕文胸
  weight: 1.0
- name: 奶咖内衣
  weight: 0.99
- name: 小胸支撑
  weight: 0.98
- name: 美背文胸
  weight: 0.97
- name: 结构示意
  weight: 0.96
- name: 拉伸证明
  weight: 0.95
- name: 颜色延展
  weight: 0.94
shots:
- id: screen_1
  name: 模特开场
  description: 'source_refs:[1]; 功能: 单模特坐姿开场页，建立奶咖暖光和柔软支撑氛围。'
  order: 1
  prompt_guide: f_code=F1+F6; screen_kind=hero-opening; style_tokens=[warm_adult_model_hero, seated_pose, nude_background]
- id: screen_2
  name: 结构示意
  description: 'source_refs:[2]; 功能: 极简结构图配四周标签的版型示意页。'
  order: 2
  prompt_guide: f_code=F3; screen_kind=annotated-breakdown; style_tokens=[product_diagram, floating_labels, airy_space]
- id: screen_3
  name: 静物单品
  description: 'source_refs:[3]; 功能: 单品静物页配花枝与短文案，强调杯型和柔软支撑。'
  order: 3
  prompt_guide: f_code=F1+F4; screen_kind=product-hero; style_tokens=[product_flatlay, floral_prop, warm_gradient]
- id: screen_4
  name: 分栏展示
  description: 'source_refs:[4]; 功能: 左侧单品右侧模特的分栏展示页。'
  order: 4
  prompt_guide: f_code=F5+F6; screen_kind=compare-closure; style_tokens=[product_and_adult_model_split, small_detail_inset,
    warm_beige]
- id: screen_5
  name: 拱门模特
  description: 'source_refs:[5]; 功能: 拱门边框中的单模特页，强调视觉稳定和留白。'
  order: 5
  prompt_guide: f_code=F2+F6; screen_kind=on-body-proof; style_tokens=[arched_frame_adult_model, clean_studio, minimal_copy]
- id: screen_6
  name: 杯型细节
  description: 'source_refs:[6]; 功能: 平铺杯模与图示说明结合的细节页。'
  order: 6
  prompt_guide: f_code=F3; screen_kind=detail-grid; style_tokens=[cup_flatlay, two_support_diagrams, soft_mat]
- id: screen_7
  name: 颜色延展
  description: 'source_refs:[7]; 功能: 彩色模特延展页，配侧边小窗展示细节差异。'
  order: 7
  prompt_guide: f_code=F5+F6; screen_kind=scene-collage; style_tokens=[alternate_colorway_adult_model, side_insets, warm_gradient]
- id: screen_8
  name: 拉伸收尾
  description: 'source_refs:[8]; 功能: 手持肩带拉伸与日夜分栏的收尾证明页。'
  order: 8
  prompt_guide: f_code=F3+F5; screen_kind=evidence-panel; style_tokens=[strap_stretch_demo, day_night_compare, warm_card]
template: 'sv=style_only_v3

  cn=中文骨架说明

  pd={{product}}

  pi={{product_info}}

  sp={{selling_points}}

  pf={{platform}}

  lg={{language}}

  bc={{batch_count}}

  arch=skeleton-only

  brain=system-prompt-only

  s1|kind=hero-opening|bg=warm-nude-studio|camera=single-adult-model-seated-portrait|layout=top-left-copy_bottom-large-model|subject=one_adult_model_in_soft_support_bra|accent=light-cardigan_prop|text_mode=strong|text_zone=bottom-left|text_align=left|text_density=two-line|copy_role=hero-benefit|slot={{copy_function_language_1}}|negative=plain-white-packshot

  s2|kind=annotated-breakdown|bg=airy-cream-diagram-board|camera=minimal-product-diagram-with-floating-labels|layout=top-right-copy_middle-centered-diagram_bottom-four-labels|subject=bra_structure_annotation|accent=soft-pill-labels|text_mode=strong|text_zone=top-right|text_align=right|text_density=bullet-list|copy_role=feature-callout|slot={{copy_function_language_2}}|negative=single-centered-packshot

  s3|kind=product-hero|bg=warm-beige-still-life-board|camera=single-product-flatlay-with-prop|layout=top-left-copy_middle-product_flatlay_bottom-short-bullets|subject=one_bra_with_cup_shape_focus|accent=flower_branch_or_small_prop|text_mode=strong|text_zone=top-left|text_align=left|text_density=short-paragraph|copy_role=hero-feature|slot={{copy_function_language_3}}|negative=headline-only

  s4|kind=compare-closure|bg=warm-cream-split-board|camera=left-product_right-adult-model_split|layout=left-product_card_right-model_photo_bottom-small-inset|subject=product_and_adult_model_dual_display|accent=detail-inset-window|text_mode=strong|text_zone=top-right|text_align=right|text_density=short-paragraph|copy_role=choice-recap|slot={{copy_function_language_4}}|negative=no-compare-layout

  s5|kind=on-body-proof|bg=soft-white-arched-frame|camera=single-adult-model-half-body|layout=top-small-copy_bottom-main-arched-photo|subject=one_adult_model_in_clean_arch_frame|accent=arched_border|text_mode=weak|text_zone=top-left|text_align=left|text_density=one-line|copy_role=comfort-proof|slot={{copy_function_language_5}}|negative=single-image-only

  s6|kind=detail-grid|bg=cream-flatlay-detail-board|camera=main-cup-flatlay-plus-two-support-diagrams|layout=top-title_middle-main-card_bottom-three-detail-boxes|subject=cup_shape_and_support_detail_notes|accent=soft-line-diagram|text_mode=strong|text_zone=top-center|text_align=center|text_density=caption-grid|copy_role=feature-callout|slot={{copy_function_language_6}}|negative=single-centered-packshot

  s7|kind=scene-collage|bg=warm-gradient-fashion-board|camera=single-adult-model-with-side-inset-column|layout=left-main-model_right-detail-inset-column|subject=alternate_colorway_and_detail_variants|accent=small-square-detail-windows|text_mode=strong|text_zone=top-right|text_align=right|text_density=short-paragraph|copy_role=scene-note|slot={{copy_function_language_7}}|negative=no-multi-panel-collage

  s8|kind=evidence-panel|bg=warm-card-proof-board|camera=strap-stretch-demo-with-compare-sections|layout=top-right-copy_middle-main-demo_bottom-two-compare-boxes|subject=elasticity_and_day_night_compare|accent=rounded-compare-panels|text_mode=strong|text_zone=bottom-left|text_align=left|text_density=bullet-list|copy_role=proof-data|slot={{copy_function_language_8}}|negative=headline-only'
defaults:
  schema_version: style_only_v3
  screen_count: '8'
  style_transfer_mode: style_only
  dynamic_sequence: 'true'
  language_lock: strict
  output_language: 中文
variables:
  product: ''
  product_info: ''
  selling_points: ''
  language: 中文
  platform: ''
  batch_count: '8'
  copy_function_language_1: ''
  copy_function_language_2: ''
  copy_function_language_3: ''
  copy_function_language_4: ''
  copy_function_language_5: ''
  copy_function_language_6: ''
  copy_function_language_7: ''
  copy_function_language_8: ''
