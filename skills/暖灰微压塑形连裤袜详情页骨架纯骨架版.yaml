  s6|kind=evidence-panel|bg=warm_beige_hanging_board|camera=hanging_flatlay_with_folded_interior|layout=top_copy_bottom_hanger_display|subject=single_legwear_flatlay_with_plush_lining|accent=round_frame_and_folded_roll|text_mode=strong|text_zone=top-left|text_align=left|text_density=two-line|copy_role=material-note|slot={{copy_function_language_6}}|negative=no-invented-extra-products
  s7|kind=on-body-proof|bg=clean_white_length_compare_board|camera=front_leg_measure_compare|layout=top_copy_bottom_bare_leg_and_legwear_pair|subject=coverage_length_proof_for_single_legwear|accent=length_markers_and_split_labels|text_mode=strong|text_zone=top-left|text_align=left|text_density=option-labels|copy_role=comfort-proof|slot={{copy_function_language_7}}|negative=single-image-only
  s8|kind=size-chart|bg=white_data_panel_with_orange_header|camera=profile_card_above_large_table|layout=top_profile_middle_table_bottom_notes|subject=legwear_size_data_board|accent=orange_tabs_and_footnote_block|text_mode=strong|text_zone=top-left|text_align=left|text_density=data-table|copy_role=proof-data|slot={{copy_function_language_8}}|negative=single-centered-packshot
