shots:
- id: screen_1
  name: 棉云开场
  description: 'source_refs:[1]; 功能: 棉花与浅蓝背景结合的开场页，保留上半图形象征和下半信息。'
  order: 1
  prompt_guide: f_code=F1+F4; screen_kind=hero-opening; style_tokens=[cotton_cloud, airy_blue_bg, split_info_layout]
- id: screen_2
  name: 极简上脚
  description: 'source_refs:[2]; 功能: 米裙与白袜的极简上脚页，突出脚背与短袜长度。'
  order: 2
  prompt_guide: f_code=F2; screen_kind=on-body-proof; style_tokens=[minimal_on_foot, skirt_hem, clean_studio_floor]
- id: screen_3
  name: 棉感对照
  description: 'source_refs:[3]; 功能: 棉花与材质对照卡结合的信息页，保留两列对照关系。'
  order: 3
  prompt_guide: f_code=F4; screen_kind=evidence-panel; style_tokens=[cotton_compare_cards, botanical_prop, airy_white_board]
- id: screen_4
  name: 桑蚕丝风格
  description: 'source_refs:[4]; 功能: 竖版标题加上脚页，突出轻奢纤维氛围和步行姿态。'
  order: 4
  prompt_guide: f_code=F6; screen_kind=on-body-proof; style_tokens=[vertical_title, walking_pose, soft_beige_style]
- id: screen_5
  name: 脚跟贴合
  description: 'source_refs:[5]; 功能: 脚跟和脚底延展的近景页，突出袜体包覆。'
  order: 5
  prompt_guide: f_code=F2; screen_kind=on-body-proof; style_tokens=[heel_fit_pose, side_foot_curve, clean_margin]
- id: screen_6
  name: 袜口特写
  description: 'source_refs:[6]; 功能: 竖向袜口近景页，保留窄长版心和上下少量文字。'
  order: 6
  prompt_guide: f_code=F5; screen_kind=macro-closeup; style_tokens=[vertical_cuff_closeup, narrow_frame, quiet_copy]
- id: screen_7
  name: 无骨工艺
  description: 'source_refs:[7]; 功能: 工艺说明加近景袜尖页，突出无骨细节和轻技术感。'
  order: 7
  prompt_guide: f_code=F5; screen_kind=macro-closeup; style_tokens=[toe_process_closeup, craft_copy, white_space]
- id: screen_8
  name: SPA信息
  description: 'source_refs:[8]; 功能: 绿色植物与信息卡页，保留竖版卡片和清透背景。'
  order: 8
  prompt_guide: f_code=F4; screen_kind=evidence-panel; style_tokens=[spa_card, bamboo_prop, translucent_green_gradation]
