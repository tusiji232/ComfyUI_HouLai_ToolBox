name: 云白桑蚕丝短袜详情页骨架纯骨架版
description: 女袜短袜、桑蚕丝短袜、云白棉袜、清透信息风格的纯骨架版详情页 skill：保留棉云开场、极简上脚、棉感对照、桑蚕丝风格、脚跟贴合、袜口特写、无骨工艺和 SPA 信息 8 屏骨架，不承载运行时文案与业务判断。适合白色短袜、桑蚕丝棉袜、无骨薄袜详情页复刻。
category: 详情页模板
schema_version: style_only_v3
trigger: 桑蚕丝短袜
trigger_words:
- 桑蚕丝短袜
- 白色短袜
- 无骨薄袜
- 云白棉袜
- 女薄款短袜
weight: 1.0
tags:
- name: 桑蚕丝短袜
  weight: 1.0
- name: 白色短袜
  weight: 0.99
- name: 无骨薄袜
  weight: 0.98
