name: "意式岩板伸缩餐桌详情页骨架纯骨架版"
description: "意式岩板餐桌、方圆两用餐桌、可伸缩餐桌、极简奶油餐台风格的纯骨架版详情页 skill：保留空间开场、材质拆解、圆桌效果、台面厚度、板材对比、边角细节、单品海报与尺寸参数 8 屏骨架，不承载运行时文案与业务判断。适合餐桌、餐台、岩板桌、变形餐桌详情页复刻。"
category: "详情页模板"
schema_version: "style_only_v3"
trigger: "岩板伸缩餐桌"
trigger_words:
  - "岩板伸缩餐桌"
  - "方圆两用餐桌"
  - "可伸缩餐桌"
  - "岩板餐桌"
  - "极简餐台"
weight: 1.0
tags:
  - name: "岩板伸缩餐桌"
    weight: 1.0
  - name: "方圆两用餐桌"
    weight: 0.99
  - name: "可伸缩餐桌"
    weight: 0.98
  - name: "奶油意式餐桌"
    weight: 0.97
  - name: "极简餐桌"
    weight: 0.96
  - name: "圆桌变形餐桌"
    weight: 0.95
  - name: "岩板餐台"
    weight: 0.94

shots:
  - id: "screen_1"
    name: "空间开场"
    description: "source_refs:[1]; 功能: 暖灰餐厅空间中的主产品开场页，整套场景居中，顶部保留系列标题与副标题。"
    order: 1
    prompt_guide: "f_code=F1+F6; screen_kind=hero-opening; style_tokens=[dining_room_scene, centered_set, series_title]"
  - id: "screen_2"
    name: "材质拆解"
    description: "source_refs:[2]; 功能: 白底单角度结构拆解页，用细线标注台面、边层和桌腿材质关系。"
    order: 2
    prompt_guide: "f_code=F3+F4; screen_kind=annotated-breakdown; style_tokens=[white_material_board, side_profile, thin_callout_lines]"
  - id: "screen_3"
    name: "圆桌效果"
    description: "source_refs:[3]; 功能: 垂直海报比例的圆桌场景效果页，上方大标题，下方保留整套用餐氛围。"
    order: 3
    prompt_guide: "f_code=F2; screen_kind=scene-hero; style_tokens=[vertical_poster, round_table_scene, centered_copy]"
  - id: "screen_4"
    name: "台面厚度"
    description: "source_refs:[4]; 功能: 近距离展示台面和侧边层级，用红点或短标签做厚度定位。"
    order: 4
    prompt_guide: "f_code=F5; screen_kind=macro-closeup; style_tokens=[edge_thickness_closeup, marker_dots, top_title]"
  - id: "screen_5"
    name: "板材对比"
    description: "source_refs:[5]; 功能: 左右双卡片对比自家用材与常见板材结构，下方列出差异点。"
    order: 5
    prompt_guide: "f_code=F4+F6; screen_kind=compare-closure; style_tokens=[material_compare_cards, split_columns, checklist_copy]"
  - id: "screen_6"
    name: "边角细节"
    description: "source_refs:[6]; 功能: 竖版细节页，放大台面边缘与支撑连接，底部附短说明条。"
    order: 6
    prompt_guide: "f_code=F5; screen_kind=detail-focus; style_tokens=[vertical_detail_poster, edge_closeup, bottom_note_strip]"
  - id: "screen_7"
    name: "单品海报"
    description: "source_refs:[7]; 功能: 窗边光影中的单主物海报页，主体竖向占比高，标题居上强化设计感。"
    order: 7
    prompt_guide: "f_code=F1+F2; screen_kind=hero-feature; style_tokens=[single_furniture_poster, window_shadow, tall_subject]"
  - id: "screen_8"
    name: "尺寸参数"
    description: "source_refs:[8]; 功能: 白底尺寸页，以主产品线稿或立面图为核心，上下组织规格信息。"
    order: 8
    prompt_guide: "f_code=F4+F6; screen_kind=parameter-sheet; style_tokens=[white_dimension_sheet, front_side_views, technical_layout]"

