shots:
  - id: "screen_1"
    name: "温柔开场"
    description: "source_refs:[1]; 功能: 暖奶油卧客厅氛围开场页，人物与主产品同框，顶部大手写感标题拉开情绪。"
    order: 1
    prompt_guide: "f_code=F1+F6; screen_kind=hero-opening; style_tokens=[warm_cream_room, lifestyle_pose, handwritten_title]"
  - id: "screen_2"
    name: "软靠场景"
    description: "source_refs:[2]; 功能: 人物俯靠主产品的舒适场景页，上部为浅色标题条，下部保留完整产品与地面层次。"
    order: 2
    prompt_guide: "f_code=F2; screen_kind=scene-hero; style_tokens=[leaning_pose_scene, cream_title_band, cozy_room]"
  - id: "screen_3"
    name: "拆洗演示"
    description: "source_refs:[3]; 功能: 近中景场景页，以人物拆开或拿起软包的动作表现可拆洗结构。"
    order: 3
    prompt_guide: "f_code=F3+F4; screen_kind=on-body-proof; style_tokens=[removable_cover_action, warm_window_light, simple_top_copy]"
  - id: "screen_4"
    name: "模块拆解"
    description: "source_refs:[4]; 功能: 白底漂浮分区拆解页，将头靠、靠包、扶手等模块分离摆放并指向主体。"
    order: 4
    prompt_guide: "f_code=F3+F4; screen_kind=annotated-breakdown; style_tokens=[exploded_parts, floating_modules, clean_background]"
  - id: "screen_5"
    name: "背书证明"
    description: "source_refs:[5]; 功能: 证书或盾牌居中的背书页，底部并列小图标或短词，形成安心证明结构。"
    order: 5
    prompt_guide: "f_code=F4; screen_kind=evidence-panel; style_tokens=[badge_centerpiece, proof_icons, soft_yellow_board]"
  - id: "screen_6"
    name: "三宫细节"
    description: "source_refs:[6]; 功能: 三块细节拼页，分别展示耐磨、抗污和防泼水等表层表现。"
    order: 6
    prompt_guide: "f_code=F5; screen_kind=detail-grid; style_tokens=[three_tile_details, brush_and_hand_actions, fabric_performance]"
  - id: "screen_7"
    name: "面料特写"
    description: "source_refs:[7]; 功能: 斜裁面料近景为主体，上方大标题与大数字，下方横向列出简短利益点。"
    order: 7
    prompt_guide: "f_code=F5+F6; screen_kind=macro-closeup; style_tokens=[diagonal_fabric_crop, large_number, bottom_benefit_row]"
  - id: "screen_8"
    name: "风格推荐"
    description: "source_refs:[8]; 功能: 以同风格房间海报做收尾，顶部标题，底部留轻量按钮或角标位置。"
    order: 8
    prompt_guide: "f_code=F2+F6; screen_kind=scene-recommendation; style_tokens=[styled_room_poster, recommendation_header, small_cta_corner]"

