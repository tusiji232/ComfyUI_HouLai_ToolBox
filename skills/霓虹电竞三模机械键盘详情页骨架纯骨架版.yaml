name: "霓虹电竞三模机械键盘详情页骨架纯骨架版"
description: "霓虹电竞、三模机械键盘风格的纯骨架版详情页 skill：保留多配色开场、功能拼贴、RGB灯效主打、内部结构爆炸图、打字场景、轴体证明、参数页和热插拔收尾 8 屏骨架，不承载运行时文案与业务判断。适合电竞键盘、三模键盘、客制化机械键盘类数码详情页复刻。"
category: "详情页模板"
schema_version: "style_only_v3"
trigger: "电竞键盘"
trigger_words:
  - "电竞键盘"
  - "机械键盘"
  - "三模键盘"
  - "客制化键盘"
  - "RGB键盘"
weight: 1.0
tags:
  - name: "电竞键盘"
    weight: 1.0
  - name: "机械键盘"
    weight: 1.0
  - name: "三模键盘"
    weight: 0.99
  - name: "客制化键盘"
    weight: 0.98
  - name: "RGB键盘"
    weight: 0.97
  - name: "热插拔"
    weight: 0.96
  - name: "轴体证明"
    weight: 0.95
  - name: "电竞数码"
    weight: 0.94

shots:
  - id: "screen_1"
    name: "多配色开场"
    description: "source_refs:[1]; 功能: 多把键盘立体错落开场，突出配色和电竞气场。"
    order: 1
    prompt_guide: "f_code=F1+F6; screen_kind=hero-opening; style_tokens=[multi_color_keyboards, purple_black_stage, centered_title]"
  - id: "screen_2"
    name: "功能拼贴"
    description: "source_refs:[2]; 功能: 六块功能卡拼贴，覆盖灯效、芯片、结构、续航和驱动。"
    order: 2
    prompt_guide: "f_code=F4+F6; screen_kind=feature-mosaic; style_tokens=[six_card_mosaic, dark_ui_panels, data_cards]"
  - id: "screen_3"
    name: "RGB灯效"
    description: "source_refs:[3]; 功能: 三把键盘与霓虹光束同框的灯效主打页。"
    order: 3
    prompt_guide: "f_code=F1+F6; screen_kind=hero-opening; style_tokens=[rgb_light_beams, three_keyboards, badge_row]"
  - id: "screen_4"
    name: "结构爆炸"
    description: "source_refs:[4]; 功能: 键盘内部分层爆炸图与侧边标注构成的机理页。"
    order: 4
    prompt_guide: "f_code=F3+F4; screen_kind=evidence-panel; style_tokens=[exploded_structure, layer_labels, dark_blue_bg]"
  - id: "screen_5"
    name: "打字体验"
    description: "source_refs:[5]; 功能: 双手俯拍打字与声波背景结合的体验页。"
    order: 5
    prompt_guide: "f_code=F2+F6; screen_kind=on-body-proof; style_tokens=[typing_hands, top_view, sound_wave_bg]"
  - id: "screen_6"
    name: "轴体证明"
    description: "source_refs:[6]; 功能: 单个轴体爆炸特写和小卡参数对照。"
    order: 6
    prompt_guide: "f_code=F3+F4; screen_kind=evidence-panel; style_tokens=[switch_explosion, closeup_keycap, lower_info_cards]"
  - id: "screen_7"
    name: "版本参数"
    description: "source_refs:[7]; 功能: 深黑表格版本参数页。"
    order: 7
    prompt_guide: "f_code=F4; screen_kind=spec-panel; style_tokens=[dark_spec_table, centered_title, keyboard_versions]"
  - id: "screen_8"
    name: "热插拔"
    description: "source_refs:[8]; 功能: 键帽被拔起露出轴座的DIY收尾页。"
    order: 8
    prompt_guide: "f_code=F3; screen_kind=detail-panel; style_tokens=[hot_swap_closeup, tool_action, diy_finish]"

template: |
  sv=style_only_v3
  cn=中文骨架说明
  pd={{product}}
  pi={{product_info}}
  sp={{selling_points}}
  pf={{platform}}
  lg={{language}}
  bc={{batch_count}}
  arch=skeleton-only
  brain=system-prompt-only
  s1|kind=hero-opening|bg=deep-black-to-purple-tech-stage|camera=multiple-keyboards-standing-front|layout=top-center-copy_bottom-multi-keyboard-display|subject=multiple-colorways-of-one-keyboard-family|accent=pedestal-blocks|text_mode=strong|text_zone=top-center|text_align=center|text_density=two-line|copy_role=hero-benefit|slot={{copy_function_language_1}}|negative=plain-white-packshot
  s2|kind=feature-mosaic|bg=deep-black-card-board|camera=six-function-card-grid|layout=top-center-copy_middle-card-mosaic|subject=keyboard-features-and-tech-modules|accent=glow-frame-cards|text_mode=strong|text_zone=top-center|text_align=center|text_density=bullet-list|copy_role=feature-callout|slot={{copy_function_language_2}}|negative=single-centered-packshot
  s3|kind=hero-opening|bg=neon-rgb-light-beam-stage|camera=three-keyboards-in-light-beams|layout=top-left-copy_middle-three-keyboards|subject=rgb-keyboard-lighting-display|accent=badge-row-and-neon-lines|text_mode=strong|text_zone=top-left|text_align=left|text_density=bullet-list|copy_role=hero-feature|slot={{copy_function_language_3}}|negative=headline-only
  s4|kind=evidence-panel|bg=dark-blue-structure-board|camera=exploded-keyboard-layers|layout=top-left-copy_middle-structure-diagram|subject=keyboard-internal-layer-structure|accent=side-layer-labels|text_mode=strong|text_zone=top-left|text_align=left|text_density=short-paragraph|copy_role=proof-data|slot={{copy_function_language_4}}|negative=single-image-only
  s5|kind=on-body-proof|bg=dark-wave-scene|camera=top-view-hands-typing|layout=top-left-copy_middle-typing-scene|subject=keyboard-in-real-use|accent=wave-rings|text_mode=strong|text_zone=top-left|text_align=left|text_density=short-paragraph|copy_role=comfort-proof|slot={{copy_function_language_5}}|negative=single-image-only
  s6|kind=evidence-panel|bg=deep-blue-closeup-board|camera=single-switch-explosion-over-keyboard|layout=top-left-copy_middle-switch-diagram_bottom-small-info-cards|subject=switch-type-proof-and-keyboard-closeup|accent=floating-switch-parts|text_mode=strong|text_zone=top-left|text_align=left|text_density=data-callout|copy_role=proof-data|slot={{copy_function_language_6}}|negative=headline-only
  s7|kind=evidence-panel|bg=deep-black-spec-sheet|camera=large-version-parameter-table|layout=top-title_middle-spec-table|subject=keyboard-version-parameters|accent=thin-grid-lines|text_mode=strong|text_zone=top-center|text_align=center|text_density=data-table|copy_role=proof-data|slot={{copy_function_language_7}}|negative=single-image-only
  s8|kind=detail-grid|bg=deep-black-closeup-board|camera=hot-swap-keycap-removal-closeup|layout=top-left-copy_middle-large-closeup|subject=hot-swap-socket-and-keycap-tool-action|accent=purple-keycap-glow|text_mode=strong|text_zone=top-left|text_align=left|text_density=short-paragraph|copy_role=feature-callout|slot={{copy_function_language_8}}|negative=single-image-only

defaults:
  schema_version: "style_only_v3"
  screen_count: "8"
  style_transfer_mode: "style_only"
  dynamic_sequence: "true"
  language_lock: "strict"
