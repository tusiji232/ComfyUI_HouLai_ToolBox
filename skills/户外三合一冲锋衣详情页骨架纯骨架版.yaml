name: 户外三合一冲锋衣详情页骨架纯骨架版
description: 女装冲锋衣、三合一外套、山地户外、防水防护风格的纯骨架版详情页 skill：保留山地开场、防水微距、结构拆解、穿着场景拼贴、产品信息、尺码表、环境穿搭和细节展示 8 屏骨架，不承载运行时文案与业务判断。适合三合一冲锋衣、户外硬壳、旅行登山防护外套详情页复刻。
category: 详情页模板
schema_version: style_only_v3
trigger: 三合一冲锋衣
trigger_words:
- 三合一冲锋衣
- 户外冲锋衣
- 防水外套
- 登山外套
- 旅行冲锋衣
weight: 1.0
tags:
- name: 三合一冲锋衣
  weight: 1.0
- name: 户外冲锋衣
  weight: 0.99
- name: 防水外套
  weight: 0.98
- name: 登山外套
  weight: 0.97
- name: 旅行冲锋衣
  weight: 0.96
- name: 山地穿搭
  weight: 0.95
- name: 硬壳防护
  weight: 0.94
- name: 户外机能
  weight: 0.93
shots:
- id: screen_1
  name: 山地开场
  description: 'source_refs:[1]; 功能: 草地和雪山背景中的单模特开场，保留强开场标题和醒目的亮色外套主体。'
  order: 1
  prompt_guide: f_code=F1+F6; screen_kind=hero-opening; style_tokens=[mountain_meadow, bright_outerwear, travel_pose]
- id: screen_2
  name: 防水微距
  description: 'source_refs:[2]; 功能: 深色背景上的水珠与布面微距页，用来承接防水卖点。'
  order: 2
  prompt_guide: f_code=F5; screen_kind=material-proof; style_tokens=[raindrop_macro, dark_surface, high_contrast]
- id: screen_3
  name: 结构拆解
  description: 'source_refs:[3]; 功能: 单件外套或剖面主图配四周说明标签，表达层次结构和防护升级。'
  order: 3
  prompt_guide: f_code=F3; screen_kind=annotated-breakdown; style_tokens=[center_jacket, surrounding_callouts, warm_dark_panel]
- id: screen_4
  name: 场景拼贴
  description: 'source_refs:[4]; 功能: 3-4 张户外场景拼贴页，保留多人物、多场地和上下分栏结构。'
  order: 4
  prompt_guide: f_code=F6; screen_kind=scene-collage; style_tokens=[multi_scene_collage, outdoor_groups, rugged_landscape]
- id: screen_5
  name: 产品信息
  description: 'source_refs:[5]; 功能: 左侧单品主图右侧参数块的信息页，突出理性说明和色卡区域。'
  order: 5
  prompt_guide: f_code=F4; screen_kind=spec-panel; style_tokens=[product_info_block, side_parameters, bottom_icons]
- id: screen_6
  name: 尺码表
  description: 'source_refs:[6]; 功能: 女款尺码表与测量说明页，保留线稿、数据表和建议体重结构。'
  order: 6
  prompt_guide: f_code=F4; screen_kind=size-chart; style_tokens=[dual_size_tables, garment_sketch, measurement_notes]
- id: screen_7
  name: 环境穿搭
  description: 'source_refs:[7]; 功能: 双模特户外环境穿着页，保留左右人物和环境适配说明。'
  order: 7
  prompt_guide: f_code=F6; screen_kind=on-body-proof; style_tokens=[two_adult_models_outdoors, environment_labels, hiking_scene]
- id: screen_8
  name: 细节展示
  description: 'source_refs:[8]; 功能: 多格细节页，展示帽部、拉链、袖口等功能件局部特写。'
  order: 8
  prompt_guide: f_code=F3; screen_kind=detail-grid; style_tokens=[three_detail_panels, function_parts, light_gray_board]
template: 'sv=style_only_v3

  cn=中文骨架说明

  pd={{product}}

  pi={{product_info}}

  sp={{selling_points}}

  pf={{platform}}

  lg={{language}}

  bc={{batch_count}}

  arch=skeleton-only

  brain=system-prompt-only

  s1|kind=hero-opening|bg=mountain_grassland_outdoor_hero|camera=single_female_model_in_bright_shell_jacket|layout=top_left_headline_bottom_full_model|subject=single_adult_model_in_protective_outerwear|accent=meadow_and_snow_peak|text_mode=strong|text_zone=top-left|text_align=left|text_density=two-line|copy_role=hero-benefit|slot={{copy_function_language_1}}|negative=plain-white-packshot

  s2|kind=material-proof|bg=dark_rain_surface_macro|camera=water_drops_on_technical_fabric|layout=top_title_middle_large_macro_bottom_small_note|subject=waterproof_fabric_surface|accent=highlighted_droplets|text_mode=strong|text_zone=top-left|text_align=left|text_density=short-paragraph|copy_role=material-note|slot={{copy_function_language_2}}|negative=single-image-only

  s3|kind=annotated-breakdown|bg=warm_dark_function_panel|camera=centered_outerwear_piece_with_callouts|layout=top_headline_middle_product_bottom_side_labels|subject=single_outerwear_breakdown|accent=surrounding_feature_notes|text_mode=strong|text_zone=left_and_right_sides|text_align=left|text_density=bullet-list|copy_role=feature-callout|slot={{copy_function_language_3}}|negative=headline-only

  s4|kind=scene-collage|bg=earth_tone_outdoor_story_board|camera=three_to_four_hiking_scene_tiles|layout=top_title_middle_multi_scene_grid_bottom_small_labels|subject=multi_scene_outdoor_wear_collage|accent=landscape_tiles_and_dark_dividers|text_mode=strong|text_zone=top-center|text_align=center|text_density=caption-grid|copy_role=scene-note|slot={{copy_function_language_4}}|negative=single-centered-packshot

  s5|kind=spec-panel|bg=light_gray_information_board|camera=single_product_render_plus_parameter_blocks|layout=left_product_right_specs_bottom_icon_band|subject=product_info_and_color_options|accent=spec_cards_and_small_icons|text_mode=strong|text_zone=right-column|text_align=left|text_density=data-table|copy_role=proof-data|slot={{copy_function_language_5}}|negative=single-image-only

  s6|kind=size-chart|bg=white_technical_size_panel|camera=garment_sketch_with_tables|layout=top_sketch_middle_dual_tables_bottom_measure_notes|subject=outerwear_size_and_measurement_data|accent=size_recommendation_badges|text_mode=strong|text_zone=top-right|text_align=left|text_density=data-table|copy_role=proof-data|slot={{copy_function_language_6}}|negative=single-centered-packshot

  s7|kind=on-body-proof|bg=natural_hiking_scene_board|camera=two_adult_models_outdoor_walk_display|layout=top_headline_bottom_dual_model_scene|subject=two_models_in_environment_adaptation_scene|accent=terrain_labels_and_small_icons|text_mode=strong|text_zone=bottom-right|text_align=left|text_density=short-paragraph|copy_role=scene-note|slot={{copy_function_language_7}}|negative=headline-only

  s8|kind=detail-grid|bg=light_gray_detail_board|camera=three_macro_function_part_panels|layout=top_title_middle_three_panel_grid_bottom_small_captions|subject=hood_zipper_cuff_details|accent=small_corner_tags|text_mode=strong|text_zone=panel_edges|text_align=left|text_density=caption-grid|copy_role=feature-callout|slot={{copy_function_language_8}}|negative=single-image-only'
defaults:
  schema_version: style_only_v3
  screen_count: '8'
  style_transfer_mode: style_only
  dynamic_sequence: 'true'
  language_lock: strict
  output_language: 中文
variables:
  product: ''
  product_info: ''
  selling_points: ''
  language: 中文
  platform: ''
  batch_count: '8'
  copy_function_language_1: ''
  copy_function_language_2: ''
  copy_function_language_3: ''
  copy_function_language_4: ''
  copy_function_language_5: ''
  copy_function_language_6: ''
  copy_function_language_7: ''
  copy_function_language_8: ''
