name: 黄蓝童趣萝卜牛仔裤详情页骨架纯骨架版
description: 女童牛仔裤、萝卜裤、童趣下装、春秋童裤风格的纯骨架版详情页 skill：保留模特开场、牛仔面料页、上身利益点、耐磨证明、双色搭配、结构标注、细节卡和信息收尾 8 屏骨架，不承载运行时文案与业务判断。适合女童牛仔裤、卡通牛仔裤、宽松萝卜裤详情页复刻。
category: 详情页模板
schema_version: style_only_v3
trigger: 萝卜牛仔裤
trigger_words:
- 萝卜牛仔裤
- 女童牛仔裤
- 童趣牛仔裤
- 宽松长裤
- 春秋童裤
weight: 1.0
tags:
- name: 萝卜牛仔裤
  weight: 1.0
- name: 女童牛仔裤
  weight: 1.0
- name: 童趣牛仔裤
  weight: 0.99
- name: 宽松长裤
  weight: 0.98
- name: 春秋童裤
  weight: 0.97
- name: 细节标注
  weight: 0.96
- name: 尺码表
  weight: 0.95
- name: 双色搭配
  weight: 0.94
shots:
- id: screen_1
  name: 模特开场
  description: 'source_refs:[1]; 功能: 女童加巨幅牛仔裤共同开场，建立黄蓝撞色和卡通童趣氛围。'
  order: 1
  prompt_guide: f_code=F1+F6; screen_kind=hero-opening; style_tokens=[yellow_blue_hero, child_model, oversized_pants]
- id: screen_2
  name: 牛仔面料
  description: 'source_refs:[2]; 功能: 同步主产品原色系牛仔面料大特写，保留底部功能徽章的面料页。'
  order: 2
  prompt_guide: f_code=F2; screen_kind=macro-closeup; style_tokens=[same_tone_denim_macro, badge_row, product_color_following_copy]
- id: screen_3
  name: 上身卖点
  description: 'source_refs:[3]; 功能: 单模特上身加裤标小窗的轻松活动利益点页面。'
  order: 3
  prompt_guide: f_code=F2+F6; screen_kind=on-body-proof; style_tokens=[single_child_model_pose, inset_patch_closeup, left_copy]
- id: screen_4
  name: 耐磨证明
  description: 'source_refs:[4]; 功能: 刷头摩擦牛仔面的耐用证明页。'
  order: 4
  prompt_guide: f_code=F3; screen_kind=evidence-panel; style_tokens=[brush_test, denim_texture, centered_demo]
- id: screen_5
  name: 双色搭配
  description: 'source_refs:[5]; 功能: 双模特多色裤型搭配页，保留脚下色块和卡通感。'
  order: 5
  prompt_guide: f_code=F5+F6; screen_kind=compare-closure; style_tokens=[two_child_models, multicolor_pants, playful_base_shapes]
- id: screen_6
  name: 结构标注
  description: 'source_refs:[6]; 功能: 裤身正面加四点结构标注的工艺说明页。'
  order: 6
  prompt_guide: f_code=F3; screen_kind=annotated-breakdown; style_tokens=[front_pants_with_callouts, numbered_notes, product_center]
- id: screen_7
  name: 细节卡片
  description: 'source_refs:[7]; 功能: 腰头、裤脚、口袋三块细节卡组合成的黄底详情页。'
  order: 7
  prompt_guide: f_code=F3; screen_kind=detail-grid; style_tokens=[three_detail_cards, yellow_board, cartoon_header]
- id: screen_8
  name: 信息收尾
  description: 'source_refs:[8]; 功能: 产品信息和尺码表收尾页，延续黄蓝标签体系。'
  order: 8
  prompt_guide: f_code=F4; screen_kind=spec-panel; style_tokens=[info_table, yellow_tabs, size_chart]
template: 'sv=style_only_v3

  cn=中文骨架说明

  pd={{product}}

  pi={{product_info}}

  sp={{selling_points}}

  pf={{platform}}

  lg={{language}}

  bc={{batch_count}}

  arch=skeleton-only

  brain=system-prompt-only

  s1|kind=hero-opening|bg=warm-cream-board-with-yellow-frame|camera=child-model-plus-oversized-pants-prop|layout=left-large-title_right-model_and_pants|subject=playful_child_model_with_denim_bottom|accent=yellow_base_shapes|text_mode=strong|text_zone=top-left|text_align=left|text_density=two-line|copy_role=hero-benefit|slot={{copy_function_language_1}}|negative=plain-white-packshot

  s2|kind=macro-closeup|bg=product-tone-denim-board|camera=single-product-color-denim-macro|layout=top-title_middle-large-macro_bottom-badge-row|subject=denim_texture_in_main_product_color_family|accent=round-function-icons_and_product-tone-copy|text_mode=strong|text_zone=top-left|text_align=left|text_density=bullet-list|copy_role=material-note|slot={{copy_function_language_2}}|negative=fixed-dark-blue-denim

  s3|kind=on-body-proof|bg=white-board-with-blue-title|camera=single-child-model-standing|layout=left-copy_right-model_bottom-small-inset|subject=one_child_model_in_denim_bottom|accent=mini-patch-closeup|text_mode=strong|text_zone=left-center|text_align=left|text_density=bullet-list|copy_role=comfort-proof|slot={{copy_function_language_3}}|negative=single-centered-packshot

  s4|kind=evidence-panel|bg=white-card-with-blue-denim-window|camera=brush-test-on-denim-surface|layout=top-title_middle-proof-photo|subject=denim_wear_resistance_demo|accent=soft-rounded-card|text_mode=strong|text_zone=top-right|text_align=right|text_density=short-paragraph|copy_role=proof-data|slot={{copy_function_language_4}}|negative=headline-only

  s5|kind=compare-closure|bg=white-board-with-color-pucks|camera=two-child-models-side-by-side|layout=top-title_middle-two-model-display_bottom-color-badges|subject=two_colorways_of_one_denim_shape|accent=playful-shadow-pucks|text_mode=strong|text_zone=top-left|text_align=left|text_density=short-paragraph|copy_role=choice-recap|slot={{copy_function_language_5}}|negative=no-compare-layout

  s6|kind=annotated-breakdown|bg=peach-cream-technical-board|camera=front-pants-flatlay-with-callouts|layout=top-title_middle-centered-product_bottom-four-annotations|subject=one_denim_bottom_with_structure_notes|accent=corner-number-labels|text_mode=strong|text_zone=top-left|text_align=left|text_density=caption-grid|copy_role=feature-callout|slot={{copy_function_language_6}}|negative=single-image-only

  s7|kind=detail-grid|bg=yellow-detail-board|camera=main-pants-plus-three-inset-details|layout=top-title_middle-main-product_bottom-three-detail-boxes|subject=waist_hem_and_pocket_details|accent=cartoon-header-strip|text_mode=strong|text_zone=top-left|text_align=left|text_density=bullet-list|copy_role=feature-callout|slot={{copy_function_language_7}}|negative=single-centered-packshot

  s8|kind=spec-panel|bg=white-info-board|camera=info-table-and-size-chart|layout=top-title_middle-product-info_bottom-size-table|subject=bottomwear_spec_and_size_data|accent=yellow-tab-system|text_mode=strong|text_zone=top-right|text_align=right|text_density=data-table|copy_role=proof-data|slot={{copy_function_language_8}}|negative=headline-only'
defaults:
  schema_version: style_only_v3
  screen_count: '8'
  style_transfer_mode: style_only
  dynamic_sequence: 'true'
  language_lock: strict
  output_language: 中文
variables:
  product: ''
  product_info: ''
  selling_points: ''
  language: 中文
  platform: ''
  batch_count: '8'
  copy_function_language_1: ''
  copy_function_language_2: ''
  copy_function_language_3: ''
  copy_function_language_4: ''
  copy_function_language_5: ''
  copy_function_language_6: ''
  copy_function_language_7: ''
  copy_function_language_8: ''
