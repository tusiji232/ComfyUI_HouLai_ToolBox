name: "中古模块直排沙发详情页骨架纯骨架版"
description: "中古模块沙发、低矮直排沙发、侘寂客厅沙发、拼块布艺沙发风格的纯骨架版详情页 skill：保留大字海报、正景场景、侧景留白、同骨架变体、顶视陈列、参数页、单品强化与版本收尾 8 屏骨架，不承载运行时文案与业务判断。适合模块沙发、低矮沙发、侘寂风沙发、复古布艺沙发详情页复刻。"
category: "详情页模板"
schema_version: "style_only_v3"
trigger: "中古模块沙发"
trigger_words:
  - "中古模块沙发"
  - "低矮直排沙发"
  - "侘寂客厅沙发"
  - "拼块沙发"
  - "复古布艺沙发"
weight: 1.0
tags:
  - name: "中古模块沙发"
    weight: 1.0
  - name: "低矮直排沙发"
    weight: 0.99
  - name: "侘寂客厅沙发"
    weight: 0.98
  - name: "拼块沙发"
    weight: 0.97
  - name: "极简落地沙发"
    weight: 0.96
  - name: "模块拼接沙发"
    weight: 0.95
  - name: "复古布艺沙发"
    weight: 0.94

shots:
  - id: "screen_1"
    name: "大字海报"
    description: "source_refs:[1]; 功能: 极简混凝土空间里的大字海报开场页，主体低矮横铺，左上以超大文字压场。"
    order: 1
    prompt_guide: "f_code=F1+F6; screen_kind=hero-opening; style_tokens=[oversized_type, low_profile_sofa, concrete_room]"
  - id: "screen_2"
    name: "正景场景"
    description: "source_refs:[2]; 功能: 正视客厅场景页，以地毯和圆几形成前景层次，标题位于上方左侧。"
    order: 2
    prompt_guide: "f_code=F2; screen_kind=scene-hero; style_tokens=[front_room_scene, foreground_table, left_copy_block]"
  - id: "screen_3"
    name: "侧景留白"
    description: "source_refs:[3]; 功能: 侧向取景的留白场景页，顶部居中只有极轻标题，主体缩小后保持氛围感。"
    order: 3
    prompt_guide: "f_code=F2+F6; screen_kind=scene-note; style_tokens=[side_angle_scene, airy_negative_space, small_center_title]"
  - id: "screen_4"
    name: "同骨架变体"
    description: "source_refs:[4]; 功能: 同一空间和构图下的同骨架变体页，强调不同版本或不同氛围。"
    order: 4
    prompt_guide: "f_code=F6; screen_kind=scene-variant; style_tokens=[same_room_restyle, product_tone_variant, top_right_copy]"
  - id: "screen_5"
    name: "顶视陈列"
    description: "source_refs:[5]; 功能: 顶视构图展示整组模块排布，与圆几形成平面关系，顶部用短标题收束。"
    order: 5
    prompt_guide: "f_code=F3+F4; screen_kind=layout-proof; style_tokens=[top_view_layout, modular_arrangement, graphic_plane]"
  - id: "screen_6"
    name: "参数页"
    description: "source_refs:[6]; 功能: 白底参数说明页，用侧视图和长度标注展示整体比例。"
    order: 6
    prompt_guide: "f_code=F4+F6; screen_kind=parameter-sheet; style_tokens=[white_spec_board, side_dimensions, simple_tech_copy]"
  - id: "screen_7"
    name: "单品强化"
    description: "source_refs:[7]; 功能: 更干净的大单品海报页，用巨大单字或短词搭配主体，强化形态辨识。"
    order: 7
    prompt_guide: "f_code=F1+F2; screen_kind=hero-feature; style_tokens=[single_sofa_poster, giant_character, clean_light_scene]"
  - id: "screen_8"
    name: "版本收尾"
    description: "source_refs:[8]; 功能: 延续单品海报骨架的收尾页，用另一种同骨架版本做最后落版。"
    order: 8
    prompt_guide: "f_code=F6; screen_kind=compare-closure; style_tokens=[same_poster_restyle, balanced_negative_space, closure_copy]"

