  s4|kind=scene-collage|bg=soft_beige_fashion_board|camera=dual_full_body_model_compare|layout=top_copy_bottom_two_outfit_columns|subject=two_winter_styling_options_with_same_legwear_family|accent=small_outfit_thumbnails|text_mode=strong|text_zone=top-left|text_align=left|text_density=short-paragraph|copy_role=scene-note|slot={{copy_function_language_4}}|negative=single-centered-packshot
  s5|kind=compare-closure|bg=clean_cream_fit_board|camera=three_body_type_legwear_columns|layout=top_copy_middle_three_fit_columns_bottom_small_labels|subject=fit_range_compare_for_single_legwear_structure|accent=column_labels_and_subtle_guides|text_mode=strong|text_zone=top-left|text_align=left|text_density=option-labels|copy_role=choice-recap|slot={{copy_function_language_5}}|negative=no-compare-layout
  s6|kind=annotated-breakdown|bg=orange_gradient_leg_panel|camera=single_leg_with_curved_callouts|layout=left_copy_right_tall_leg_visual|subject=single_legwear_curve_support_mapping|accent=body_zone_callouts|text_mode=strong|text_zone=left-side|text_align=left|text_density=bullet-list|copy_role=feature-callout|slot={{copy_function_language_6}}|negative=single-image-only
  s7|kind=annotated-breakdown|bg=soft_beige_measure_board|camera=single_leg_front_measure_view|layout=top_copy_bottom_segmented_leg_and_scale|subject=sectioned_pressure_guidance_for_legwear|accent=vertical_scale_and_zone_lines|text_mode=strong|text_zone=top-left|text_align=left|text_density=option-labels|copy_role=comfort-proof|slot={{copy_function_language_7}}|negative=single-centered-packshot
  s8|kind=size-chart|bg=white_data_panel_with_warm_orange_table|camera=large_size_reference_table|layout=top_title_middle_full_table_bottom_small_notes|subject=fleece_legwear_size_reference|accent=orange_header_cells|text_mode=strong|text_zone=top-left|text_align=left|text_density=data-table|copy_role=proof-data|slot={{copy_function_language_8}}|negative=headline-only
