name: "黑金奶油降噪头戴耳机详情页骨架纯骨架版"
description: "黑金科技、奶油色头戴耳机风格的纯骨架版详情页 skill：保留深黑开场主图、多卡功能拼贴、大数字降噪证明、三场景佩戴、单人像体验、声学结构机理、舒适细节和参数页 8 屏骨架，不承载运行时文案与业务判断。适合头戴耳机、无线耳机、主动降噪数码详情页复刻。"
category: "详情页模板"
schema_version: "style_only_v3"
trigger: "降噪耳机"
trigger_words:
  - "降噪耳机"
  - "头戴耳机"
  - "无线耳机"
  - "Hi-Res耳机"
  - "数码耳机"
weight: 1.0
tags:
  - name: "降噪耳机"
    weight: 1.0
  - name: "头戴耳机"
    weight: 1.0
  - name: "无线耳机"
    weight: 0.99
  - name: "Hi-Res耳机"
    weight: 0.98
  - name: "数码耳机"
    weight: 0.97
  - name: "黑金科技"
    weight: 0.96
  - name: "佩戴场景"
    weight: 0.95
  - name: "参数页"
    weight: 0.94

shots:
  - id: "screen_1"
    name: "黑金开场"
    description: "source_refs:[1]; 功能: 深黑到暖金渐变中的单耳机开场，保留大标题与认证徽章区。"
    order: 1
    prompt_guide: "f_code=F1+F6; screen_kind=hero-opening; style_tokens=[dark_gold_gradient, single_headphone, hi_res_badge]"
  - id: "screen_2"
    name: "功能拼贴"
    description: "source_refs:[2]; 功能: 多卡片功能拼贴页，保留局部特写、图标徽章、机理小卡和APP小卡。"
    order: 2
    prompt_guide: "f_code=F4+F6; screen_kind=feature-mosaic; style_tokens=[multi_function_cards, cream_board, app_card]"
  - id: "screen_3"
    name: "降噪证明"
    description: "source_refs:[3]; 功能: 单耳机居中配大数字和发光圆环的性能证明页。"
    order: 3
    prompt_guide: "f_code=F3; screen_kind=evidence-panel; style_tokens=[giant_noise_number, centered_headphone, dark_stage]"
  - id: "screen_4"
    name: "三场景佩戴"
    description: "source_refs:[4]; 功能: 上下三段人物佩戴场景，覆盖差旅、室内和学习。"
    order: 4
    prompt_guide: "f_code=F6; screen_kind=scene-collage; style_tokens=[three_usage_panels, portrait_wear, cream_frames]"
  - id: "screen_5"
    name: "单人体验"
    description: "source_refs:[5]; 功能: 单人像近景配底部模式图标的体验页。"
    order: 5
    prompt_guide: "f_code=F2+F6; screen_kind=on-body-proof; style_tokens=[single_portrait_closeup, sound_wave, mode_icons]"
  - id: "screen_6"
    name: "声学结构"
    description: "source_refs:[6]; 功能: 爆炸式声学单元结构和黑金粒子场景构成的机理证明页。"
    order: 6
    prompt_guide: "f_code=F3+F4; screen_kind=evidence-panel; style_tokens=[exploded_driver_unit, gold_particles, structure_proof]"
  - id: "screen_7"
    name: "舒适细节"
    description: "source_refs:[7]; 功能: 上大下小的舒适细节页，头梁近景配多张小卡说明。"
    order: 7
    prompt_guide: "f_code=F3; screen_kind=detail-grid; style_tokens=[large_headband_macro, comfort_cards, cream_texture]"
  - id: "screen_8"
    name: "产品参数"
    description: "source_refs:[8]; 功能: 极简白底参数卡页。"
    order: 8
    prompt_guide: "f_code=F4; screen_kind=spec-panel; style_tokens=[clean_parameter_card, centered_title, white_sheet]"

template: |
  sv=style_only_v3
  cn=中文骨架说明
  pd={{product}}
  pi={{product_info}}
  sp={{selling_points}}
  pf={{platform}}
  lg={{language}}
  bc={{batch_count}}
  arch=skeleton-only
  brain=system-prompt-only
  s1|kind=hero-opening|bg=deep-black-to-warm-gold-gradient|camera=single-headphone-floating-front|layout=top-center-copy_bottom-large-subject|subject=one-dominant-headphone|accent=hi-res-badge-and-rock-base|text_mode=strong|text_zone=top-center|text_align=center|text_density=two-line|copy_role=hero-benefit|slot={{copy_function_language_1}}|negative=plain-white-packshot
  s2|kind=feature-mosaic|bg=cream-function-board|camera=multi-card-layout-with-headphone-and-icons|layout=top-left-copy_middle-card-mosaic_bottom-mini-cards|subject=headphone-features-and-support-cards|accent=soft-gold-badges-and-device-insets|text_mode=strong|text_zone=top-left|text_align=left|text_density=bullet-list|copy_role=feature-callout|slot={{copy_function_language_2}}|negative=single-centered-packshot
  s3|kind=evidence-panel|bg=dark-stage-with-glowing-ring|camera=centered-headphone-and-giant-number|layout=top-left-copy_middle-large-proof_number_bottom-data-strip|subject=one-headphone-with-performance-proof|accent=light-ring-and-gold-particles|text_mode=strong|text_zone=top-left|text_align=left|text_density=data-callout|copy_role=proof-data|slot={{copy_function_language_3}}|negative=headline-only
  s4|kind=scene-collage|bg=cream-portrait-panel|camera=three-stacked-wear-scenes|layout=top-copy_middle-three-scene-stack|subject=human-wear-scenes-in-three-contexts|accent=rounded-image-cards|text_mode=strong|text_zone=top-left|text_align=left|text_density=short-paragraph|copy_role=scene-note|slot={{copy_function_language_4}}|negative=single-image-only
  s5|kind=on-body-proof|bg=warm-gray-lifestyle-scene|camera=single-portrait-headphone-closeup|layout=top-left-copy_middle-portrait_bottom-mode-icons|subject=one-person-wearing-headphone|accent=sound-wave-and-icon-row|text_mode=strong|text_zone=top-left|text_align=left|text_density=bullet-list|copy_role=comfort-proof|slot={{copy_function_language_5}}|negative=no-multi-panel-collage
  s6|kind=evidence-panel|bg=deep-black-gold-tech-board|camera=exploded-audio-driver-closeup|layout=top-left-copy_middle-large-structure_bottom-small-caption|subject=audio-driver-structure-and-sound-proof|accent=gold-particle-field|text_mode=strong|text_zone=top-left|text_align=left|text_density=short-paragraph|copy_role=proof-data|slot={{copy_function_language_6}}|negative=headline-only
  s7|kind=detail-grid|bg=cream-detail-board|camera=one-large-comfort-macro-plus-four-small-cards|layout=top-left-copy_middle-large-macro_bottom-small-detail-grid|subject=headband-earcup-and-folding-details|accent=cream-material-closeups|text_mode=strong|text_zone=top-left|text_align=left|text_density=bullet-list|copy_role=material-note|slot={{copy_function_language_7}}|negative=single-image-only
  s8|kind=evidence-panel|bg=clean-white-spec-sheet|camera=parameter-card-only|layout=top-title_middle-spec-card|subject=product-parameter-table|accent=soft-gray-card|text_mode=strong|text_zone=top-center|text_align=center|text_density=data-table|copy_role=proof-data|slot={{copy_function_language_8}}|negative=single-image-only

