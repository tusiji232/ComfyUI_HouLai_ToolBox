  name: 收尾展示
  description: 'source_refs:[8]; 功能: 收尾展示页，保留并列陈列、场景回收和简洁收束区。'
  order: 8
  prompt_guide: f_code=F4+F6; screen_kind=compare-closure; style_tokens=[beauty-editorial-closure-board, multi-angle-shot, top-copy_middle-array_bottom-note]
