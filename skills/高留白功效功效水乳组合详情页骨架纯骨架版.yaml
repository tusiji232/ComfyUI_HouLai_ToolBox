  prompt_guide: f_code=F6; screen_kind=scene-collage; style_tokens=[beauty-editorial-scene-board, scene-shot, top-copy_middle-scene_bottom-note]
- id: screen_3
  name: 结构拆解
  description: 'source_refs:[3]; 功能: 结构拆解页，保留主体、编号标注和侧边说明区。'
  order: 3
  prompt_guide: f_code=F3; screen_kind=annotated-breakdown; style_tokens=[beauty-editorial-breakdown-board, product-with-callouts, main-subject_with-side-callouts]
- id: screen_4
  name: 功能说明
  description: 'source_refs:[4]; 功能: 功能说明页，保留主体近景、顶部标题和功能标签区。'
  order: 4
  prompt_guide: f_code=F3+F4; screen_kind=evidence-panel; style_tokens=[beauty-editorial-feature-board, closeup-shot, top-copy_middle-closeup_bottom-icons]
- id: screen_5
  name: 细节近景
  description: 'source_refs:[5]; 功能: 细节近景页，保留包装与质地局部、标题区和留白说明位。'
  order: 5
  prompt_guide: f_code=F5; screen_kind=macro-closeup; style_tokens=[white-detail-board, detail-closeup-shot, top-copy_middle-closeup_bottom-note]
- id: screen_6
  name: 部件关系
  description: 'source_refs:[6]; 功能: 部件关系页，保留局部特写、分栏结构和说明分区。'
  order: 6
  prompt_guide: f_code=F5; screen_kind=detail-grid; style_tokens=[clean-white-panel-board, part-array-shot, stacked-panels_with-side-copy]
- id: screen_7
  name: 信息参数
  description: 'source_refs:[7]; 功能: 信息参数页，保留主体缩略图、规格表和脚注区关系。'
  order: 7
  prompt_guide: f_code=F4; screen_kind=evidence-panel; style_tokens=[white-data-board, product-plus-table-shot, left-thumb_right-table]
