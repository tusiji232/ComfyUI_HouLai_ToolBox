shots:
- id: screen_1
  name: 开场主视觉
  description: 'source_refs:[1]; 功能: 开场主视觉页，保留功效水乳组合主体、氛围背景和主标题区。'
  order: 1
  prompt_guide: f_code=F1+F6; screen_kind=hero-opening; style_tokens=[beauty-editorial-stage, hero-shot, top-copy_bottom-subject]
- id: screen_2
  name: 场景展示
  description: 'source_refs:[2]; 功能: 场景展示页，保留功效水乳组合与瓶罐陈列节奏的关系、副标题和环境氛围。'
