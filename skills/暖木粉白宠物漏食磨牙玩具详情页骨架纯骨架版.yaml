name: "暖木粉白宠物漏食磨牙玩具详情页骨架纯骨架版"
description: "暖木粉白、宠物磨牙骨、漏食洁齿玩具风格的纯骨架版详情页 skill：保留双玩具开场、单品标注拆解、双卡细节说明、微距与实拍混排、参数表、变体展示和宠物使用拼贴 8 屏骨架，不承载运行时文案与业务判断。适合狗狗玩具、漏食玩具、洁齿磨牙、嗅闻互动类宠物用品详情页复刻。"
category: "详情页模板"
schema_version: "style_only_v3"
trigger: "宠物磨牙骨"
trigger_words:
  - "宠物磨牙骨"
  - "狗狗玩具"
  - "漏食玩具"
  - "洁齿磨牙"
  - "嗅闻玩具"
weight: 1.0
tags:
  - name: "宠物磨牙骨"
    weight: 1.0
  - name: "狗狗玩具"
    weight: 1.0
  - name: "漏食玩具"
    weight: 0.99
  - name: "洁齿磨牙"
    weight: 0.98
