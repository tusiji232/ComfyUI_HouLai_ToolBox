    weight: 0.95
  - name: "宠物用品"
    weight: 0.94

shots:
  - id: "screen_1"
    name: "双品开场"
    description: "source_refs:[1]; 功能: 暖木桌面上的双色双玩具开场，顶部保留柔和标题区，突出轻松温暖的宠物用品氛围。"
    order: 1
    prompt_guide: "f_code=F1+F6; screen_kind=hero-opening; style_tokens=[warm_wood_table, dual_pet_toys, soft_pink_title]"
  - id: "screen_2"
    name: "单品拆解"
    description: "source_refs:[2]; 功能: 单件骨头玩具白底居中，围绕软刺、漏食孔和表面纹理做标注说明。"
    order: 2
    prompt_guide: "f_code=F2; screen_kind=annotated-breakdown; style_tokens=[single_toy_center, arrow_callouts, white_background]"
  - id: "screen_3"
    name: "双卡细节"
    description: "source_refs:[3]; 功能: 上下两张细节卡片展示同一玩具，并配局部放大窗说明表面结构和藏食孔位。"
    order: 3
    prompt_guide: "f_code=F3; screen_kind=detail-panel; style_tokens=[stacked_detail_cards, circular_zoom_insets, light_pink_frames]"
  - id: "screen_4"
    name: "微距实拍"
    description: "source_refs:[4]; 功能: 上半部分微距纹理，下半部分狗狗使用实拍和安全说明，形成细节与场景混排。"
    order: 4
    prompt_guide: "f_code=F4+F6; screen_kind=scene-collage; style_tokens=[macro_texture, dog_use_scene, mixed_panels]"
  - id: "screen_5"
    name: "参数表"
    description: "source_refs:[5]; 功能: 极简白底参数卡，顶部标题，下部表格信息，保持清晰理性的中段收束。"
    order: 5
    prompt_guide: "f_code=F4; screen_kind=spec-panel; style_tokens=[clean_parameter_sheet, centered_title, white_table_card]"
  - id: "screen_6"
    name: "变体球体"
    description: "source_refs:[6]; 功能: 木桌场景中的双色球形玩具展示，作为同系列变体页，弱化文字、强化单品切换。"
    order: 6
    prompt_guide: "f_code=F1; screen_kind=product-display; style_tokens=[dual_round_toys, warm_table, weak_copy]"
  - id: "screen_7"
    name: "骨头展示"
    description: "source_refs:[7]; 功能: 木桌场景中的双色骨头玩具并排陈列，配轻量道具，延续温暖产品展示节奏。"
    order: 7
    prompt_guide: "f_code=F1+F6; screen_kind=product-display; style_tokens=[dual_bone_toys, warm_scene_prop, display_page]"
  - id: "screen_8"
    name: "宠物使用"
    description: "source_refs:[8]; 功能: 上大下小三图拼贴的宠物咬玩具真实使用页，突出互动和食物引导玩法。"
    order: 8
    prompt_guide: "f_code=F6; screen_kind=scene-collage; style_tokens=[one_large_two_small, dog_interaction, usage_collage]"

