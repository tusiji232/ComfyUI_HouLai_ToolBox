shots:
  - id: "screen_1"
    name: "暗场开篇"
    description: "source_refs:[1]; 功能: 暗场提问式开场，上方大字钩子与下方小字并置，右下角保留半身座椅轮廓和极光光带。"
    order: 1
    prompt_guide: "f_code=F1+F6; screen_kind=hero-opening; style_tokens=[aurora_dark_stage, question_hook, partial_chair_silhouette]"
  - id: "screen_2"
    name: "霓光主视觉"
    description: "source_refs:[2,3]; 功能: 霓虹电竞房中的主椅英雄页，完整正面主体居中，顶部主标题配少量补充文案。"
    order: 2
    prompt_guide: "f_code=F1+F2; screen_kind=scene-hero; style_tokens=[rgb_gaming_room, centered_full_chair, neon_light_bars]"
  - id: "screen_3"
    name: "工学卖点"
    description: "source_refs:[4]; 功能: 多卡片拼页拆解肩颈、扶手、躺靠与光效等核心卖点，保留专业参数感与分栏结构。"
    order: 3
    prompt_guide: "f_code=F3; screen_kind=detail-grid; style_tokens=[feature_card_grid, orange_badges, product_detail_crops]"
  - id: "screen_4"
    name: "动态追腰"
    description: "source_refs:[5]; 功能: 标题置上，主体以侧视或半剖结构解释动态追腰和背部调节逻辑，辅以局部说明框。"
    order: 4
    prompt_guide: "f_code=F3+F5; screen_kind=evidence-panel; style_tokens=[side_structure_view, dynamic_support_callouts, mechanism_crops]"
  - id: "screen_5"
    name: "腰背包裹"
    description: "source_refs:[6]; 功能: 近景特写表现腰背三段包裹与角度支撑，保留弧线箭头、角度标注和包裹感文案位置。"
    order: 5
    prompt_guide: "f_code=F5; screen_kind=macro-closeup; style_tokens=[lumbar_closeup, angle_badges, curved_support_lines]"
  - id: "screen_6"
    name: "场景搭配"
    description: "source_refs:[7]; 功能: 完整座椅置于居家电竞混合场景，突出灯光氛围、陈设道具和多风格百搭感。"
    order: 6
    prompt_guide: "f_code=F2+F6; screen_kind=scene-collage; style_tokens=[styled_room_scene, ambient_lights, decor_props]"
  - id: "screen_7"
    name: "结构总览"
    description: "source_refs:[8]; 功能: 正面主图搭配侧面或背面小视图，集中说明头枕、扶手、椅背、底盘等整体结构。"
    order: 7
    prompt_guide: "f_code=F3+F4; screen_kind=compare-proof; style_tokens=[multi_view_overview, feature_pointers, clean_spec_layout]"
  - id: "screen_8"
    name: "上机收尾"
    description: "source_refs:[9]; 功能: 真人使用场景收尾，桌面设备与坐姿关系明确，文案区位于人物或桌面侧上方。"
    order: 8
    prompt_guide: "f_code=F2+F6; screen_kind=comfort-closure; style_tokens=[user_seated_scene, desk_setup, comfort_finish]"

