name: "霓光电竞人体工学椅详情页骨架纯骨架版"
description: "电竞椅、人体工学椅、RGB电竞房、久坐护腰风格的纯骨架版详情页 skill：保留暗场提问开场、霓虹主视觉、工学卖点拼页、动态追腰、腰背包裹、多场景搭配、结构总览和上机体验 8 屏骨架，不承载运行时文案与业务判断。适合电竞椅、人体工学电脑椅、电竞房家居座椅详情页复刻。"
category: "详情页模板"
schema_version: "style_only_v3"
trigger: "霓光电竞椅"
trigger_words:
  - "霓光电竞椅"
  - "电竞人体工学椅"
  - "RGB电竞房椅"
  - "久坐护腰椅"
  - "游戏电脑椅"
weight: 1.0
