name: 山野童趣男童长袖T恤详情页骨架纯骨架版
description: 男童长袖 T 恤、纯棉打底衫、山野童装、春秋男童上衣风格的纯骨架版详情页 skill：保留户外开场、坐姿体验、内里证明、跑动场景、白布说明、细节宫格、信息尺码和模特收尾 8 屏骨架，不承载运行时文案与业务判断。适合男童长袖
  T、纯棉打底衫、自然系童装上衣详情页复刻。
category: 详情页模板
schema_version: style_only_v3
trigger: 男童长袖T
